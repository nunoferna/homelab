apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  description: "Cluster platform components"
  sourceRepos:
    - https://github.com/nunoferna/homelab.git
    - https://grafana.github.io/helm-charts
    - https://helm.cilium.io
    - https://helm.releases.hashicorp.com
    - https://pkgs.tailscale.com/helmcharts
    - oci://ghcr.io/backstage/charts/backstage
    - oci://ghcr.io/external-secrets/charts/external-secrets
    - oci://ghcr.io/grafana/helm-charts/loki
    - oci://ghcr.io/kyverno/charts/kyverno
    - oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack
    - oci://quay.io/jetstack/charts/cert-manager
  destinations:
    - namespace: backstage
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: gateway
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: kyverno
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: tailscale
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  description: "User-facing workloads"
  sourceRepos:
    - https://github.com/nunoferna/homelab.git
    - https://github.com/nunoferna/pihole-helm.git
  destinations:
    - namespace: pihole
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  orphanedResources:
    warn: true
