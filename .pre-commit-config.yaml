minimum_pre_commit_version: "3.7.0"

default_install_hook_types:
  - pre-commit
  - pre-push

default_stages:
  - pre-commit

ci:
  autofix_commit_msg: "chore: apply pre-commit fixes"
  autoupdate_commit_msg: "chore: update pre-commit hooks"

exclude: |
  (?x)^(
    backstage/node_modules/|
    backstage/dist/|
    backstage/dist-types/|
    backstage/.yarn/|
    \.terraform/|
    \.ansible/|
    \.venv/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: ^gitops/bootstrap/applicationset.*\.yaml$
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: trailing-whitespace

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
      - id: terraform_tflint
        args:
          - --args=--minimum-failure-severity=warning

  - repo: https://github.com/ansible/ansible-lint
    rev: v25.11.0
    hooks:
      - id: ansible-lint
        files: ^ansible/
        additional_dependencies:
          - ansible-core>=2.19.0

  - repo: local
    hooks:
      - id: gitops-app-contract
        name: GitOps app contract
        entry: python scripts/pre-commit/validate_gitops_apps.py
        language: python
        files: ^gitops/(apps|platform)/[^/]+/app\.yaml$
        pass_filenames: false
