---
network_ipv4_address: 192.168.1.253
network_ipv4_prefix: 24
network_ipv6_address: "fd00::253"  # Adjust based on your IPv6 prefix
network_ipv6_prefix: 64
network_gateway: 192.168.1.254
network_dns_servers:
  - "1.1.1.1"
  - "1.0.0.1"

network_firewall_enabled: true
network_firewall_trusted_ipv4_cidrs:
  - "192.168.1.0/24"
network_firewall_trusted_ipv6_cidrs:
  - "fd00::/64"
network_firewall_allowed_tcp_ports:
  - 22
  - 80
  - 443
  - 6443
