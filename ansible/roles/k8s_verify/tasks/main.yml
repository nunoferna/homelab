---
- name: Wait for Kubernetes API to be responsive
  ansible.builtin.command: kubectl version --request-timeout=5s
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: k8s_verify_api
  until: k8s_verify_api.rc == 0
  retries: "{{ k8s_api_retries }}"
  delay: "{{ k8s_api_delay }}"
  changed_when: false
  tags: verify

- name: Wait for node resource to appear
  ansible.builtin.command: kubectl get nodes -o name
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: k8s_verify_nodes_available
  until: k8s_verify_nodes_available.stdout is search('node/')
  retries: "{{ k8s_api_retries }}"
  delay: "{{ k8s_api_delay }}"
  changed_when: false
  tags: verify

- name: Get cluster nodes status
  ansible.builtin.command: kubectl get nodes -o wide
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: k8s_verify_cluster_nodes
  changed_when: false
  tags: verify

- name: Get all cluster resources
  ansible.builtin.command: kubectl get all -A -o wide
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: k8s_verify_cluster_resources
  changed_when: false
  tags: verify

- name: Display final verification status
  ansible.builtin.debug:
    msg:
      - "✓ Kubernetes API is responsive; Terraform cluster bootstrap will install Cilium"
      - "{{ k8s_verify_cluster_nodes.stdout_lines }}"
  tags: verify
