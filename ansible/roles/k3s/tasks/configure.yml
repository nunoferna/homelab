- name: Ensure k3s configuration directory exists
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: "0700"
  tags: config
  become: true

- name: Ensure k3s audit log directory exists
  ansible.builtin.file:
    path: "{{ k3s_audit_log_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: config
  become: true

- name: Deploy k3s audit policy file
  ansible.builtin.copy:
    src: audit-policy.yaml
    dest: "{{ k3s_audit_policy_file }}"
    owner: root
    group: root
    mode: "0600"
  register: k3s_audit_policy_deployed
  tags: config
  become: true

- name: Deploy k3s configuration file
  ansible.builtin.copy:
    src: config.yaml
    dest: "{{ k3s_config_file }}"
    owner: root
    group: root
    mode: "0600"
  register: k3s_config_deployed
  tags: config
  become: true

- name: Display configuration deployment status
  ansible.builtin.debug:
    msg:
      - "k3s configuration: {{ 'deployed' if k3s_config_deployed.changed else 'unchanged' }}"
      - "audit policy: {{ 'deployed' if k3s_audit_policy_deployed.changed else 'unchanged' }}"
      - "config file: {{ k3s_config_file }}"
  tags: config
