name: Cluster Bootstrap Terraform

concurrency:
  group: cluster-bootstrap-terraform
  cancel-in-progress: true

on:
  workflow_call:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform/cluster-bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false

      - name: Ensure state directory exists
        run: mkdir -p /home/nof/.terraform/cluster-bootstrap

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color tfplan
