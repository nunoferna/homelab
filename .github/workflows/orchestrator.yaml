name: CI Orchestrator

concurrency:
  group: ci-orchestrator-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      aws_kms: ${{ steps.filter.outputs.aws_kms }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}
      cluster_bootstrap: ${{ steps.filter.outputs.cluster_bootstrap }}
      tailscale: ${{ steps.filter.outputs.tailscale }}
      vault: ${{ steps.filter.outputs.vault }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            aws_kms:
              - 'terraform/aws-kms/**'
              - '.github/workflows/terraform-aws-kms.yaml'
            bootstrap:
              - 'ansible/**'
            cluster_bootstrap:
              - 'terraform/cluster-bootstrap/**'
              - 'gitops/platform/cilium-resources/**'
              - 'gitops/platform/vault/**'
              - '.github/workflows/terraform-cluster-bootstrap.yaml'
            tailscale:
              - 'terraform/tailscale/**'
            vault:
              - 'terraform/vault/**'
              - 'gitops/platform/vault/**'

  run-bootstrap:
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.bootstrap == 'true'
      }}
    uses: ./.github/workflows/bootstrap.yaml
    secrets: inherit

  run-tailscale:
    needs: [changes, run-bootstrap]
    if: >-
      ${{
        always() &&
        needs.changes.outputs.tailscale == 'true' &&
        contains(fromJSON('["success", "skipped"]'), needs.run-bootstrap.result)
      }}
    uses: ./.github/workflows/terraform-tailscale.yaml
    secrets: inherit

  run-cluster-bootstrap:
    needs: [changes, run-bootstrap]
    if: >-
      ${{
        always() &&
        needs.changes.outputs.cluster_bootstrap == 'true' &&
        contains(fromJSON('["success", "skipped"]'), needs.run-bootstrap.result)
      }}
    uses: ./.github/workflows/terraform-cluster-bootstrap.yaml
    secrets: inherit

  run-aws-kms:
    needs: [changes, run-bootstrap, run-cluster-bootstrap]
    if: >-
      ${{
        always() &&
        needs.changes.outputs.aws_kms == 'true' &&
        contains(fromJSON('["success", "skipped"]'), needs.run-bootstrap.result) &&
        contains(fromJSON('["success", "skipped"]'), needs.run-cluster-bootstrap.result)
      }}
    uses: ./.github/workflows/terraform-aws-kms.yaml
    secrets: inherit

  run-vault:
    needs: [changes, run-bootstrap, run-cluster-bootstrap, run-aws-kms]
    if: >-
      ${{
        always() &&
        needs.changes.outputs.vault == 'true' &&
        contains(fromJSON('["success", "skipped"]'), needs.run-bootstrap.result) &&
        contains(fromJSON('["success", "skipped"]'), needs.run-cluster-bootstrap.result) &&
        contains(fromJSON('["success", "skipped"]'), needs.run-aws-kms.result)
      }}
    uses: ./.github/workflows/terraform-vault.yaml
    secrets: inherit
