name: CI Orchestrator

concurrency:
  group: ci-orchestrator-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: Check which files have changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      aws_kms: ${{ steps.filter.outputs.aws_kms }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}
      cluster_bootstrap: ${{ steps.filter.outputs.cluster_bootstrap }}
      tailscale: ${{ steps.filter.outputs.tailscale }}
      vault: ${{ steps.filter.outputs.vault }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            aws_kms:
              - 'terraform/aws-kms/**'
              - '.github/workflows/terraform-aws-kms.yaml'
            bootstrap:
              - 'ansible/**'
            cluster_bootstrap:
              - 'terraform/cluster-bootstrap/**'
              - 'gitops/platform/cilium-resources/**'
              - 'gitops/platform/vault/**'
              - '.github/workflows/terraform-cluster-bootstrap.yaml'
            tailscale:
              - 'terraform/tailscale/**'
            vault:
              - 'terraform/vault/**'
              - 'gitops/platform/vault/**'

  # Job 2: Run Bootstrap (Only if ansible files changed)
  run-bootstrap:
    needs: changes
    if: ${{ needs.changes.outputs.bootstrap == 'true' }}
    uses: ./.github/workflows/bootstrap.yaml
    secrets: inherit

  # Job 3: Run Tailscale Terraform
  run-tailscale:
    needs: [changes, run-bootstrap]
    if: ${{ always() && needs.changes.outputs.tailscale == 'true' && (needs.run-bootstrap.result == 'success' || needs.run-bootstrap.result == 'skipped') }}
    uses: ./.github/workflows/terraform-tailscale.yaml
    secrets: inherit

  # Job 4: Run AWS KMS Terraform
  run-aws-kms:
    needs: [changes, run-bootstrap]
    if: ${{ always() && needs.changes.outputs.aws_kms == 'true' && (needs.run-bootstrap.result == 'success' || needs.run-bootstrap.result == 'skipped') }}
    uses: ./.github/workflows/terraform-aws-kms.yaml
    secrets: inherit

  # Job 5: Run Cluster Bootstrap Terraform
  run-cluster-bootstrap:
    needs: [changes, run-bootstrap, run-aws-kms]
    if: ${{ always() && needs.changes.outputs.cluster_bootstrap == 'true' && (needs.run-bootstrap.result == 'success' || needs.run-bootstrap.result == 'skipped') && (needs.run-aws-kms.result == 'success' || needs.run-aws-kms.result == 'skipped') }}
    uses: ./.github/workflows/terraform-cluster-bootstrap.yaml
    secrets: inherit

  # Job 6: Run Vault Terraform
  run-vault:
    needs: [changes, run-bootstrap, run-aws-kms, run-cluster-bootstrap]
    if: ${{ always() && needs.changes.outputs.vault == 'true' && (needs.run-bootstrap.result == 'success' || needs.run-bootstrap.result == 'skipped') && (needs.run-aws-kms.result == 'success' || needs.run-aws-kms.result == 'skipped') && (needs.run-cluster-bootstrap.result == 'success' || needs.run-cluster-bootstrap.result == 'skipped') }}
    uses: ./.github/workflows/terraform-vault.yaml
    secrets: inherit
