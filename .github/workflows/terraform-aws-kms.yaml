name: AWS KMS Terraform

concurrency:
  group: aws-kms-terraform
  cancel-in-progress: true

on:
  workflow_call:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

jobs:
  terraform:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform/aws-kms
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false

      - name: Ensure state directory exists
        run: mkdir -p /home/nof/.terraform/aws-kms

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color tfplan
